name: API Tests
on:
  push:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    - name: Install Node
      uses: actions/setup-node@v3
      with:
        node-version: '22'
    - name: Install Newman
      run: npm install -g newman
    - name: Run API Tests
      run: newman run collection.json -e environment.json